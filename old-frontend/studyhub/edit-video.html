<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Video</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Shared navbar -->
  <div class="navbar">
    <a href="index.html">Study Hub</a>
    <a href="upload-resource.html">Upload Resource</a>
  </div>

  <h1>Edit Video</h1>
  <p>Update an existing learning resource</p>

  <div class="form-container">
    <form id="edit-form">
      <label for="title">Video Title</label>
      <input type="text" id="title" />

      <label for="subject">Subject</label>
      <input type="text" id="subject" />

      <label for="description">Description</label>
      <textarea id="description" rows="4"></textarea>

      <label for="videoUrl">Video URL</label>
      <input type="text" id="videoUrl" />

      <label for="slidesUrl">Lecture Slides URL</label>
      <input type="text" id="slidesUrl" />

      <label for="labSheetUrl">Lab Sheet URL</label>
      <input type="text" id="labSheetUrl" />

      <label for="modelPaperUrl">Model Paper URL</label>
      <input type="text" id="modelPaperUrl" />

      <label for="uploader">Uploader Name</label>
      <input type="text" id="uploader" />

      <button type="submit">Update Video</button>
    </form>

    <div id="message"></div>
  </div>

  <script src="edit.js"></script>
</body>
</html>

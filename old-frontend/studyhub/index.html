<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Hub</title>

  <!-- Connect external CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">📚 Study Hub</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="upload-resource.html">Upload</a>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Study Hub</h1>
    <p>Academic Video Resources for University Students</p>
  </div>

  <!-- Search and Sort Controls -->
  <div class="controls">
    <input
      type="text"
      id="search-input"
      placeholder="🔍 Search by title or subject..."
    />
    <div class="sort-box">
      <label for="sort-select">Sort By:</label>
      <select id="sort-select">
        <option value="default">Default</option>
        <option value="latest">Latest</option>
        <option value="views">Most Viewed</option>
        <option value="rating">Highest Rated</option>
      </select>
    </div>
  </div>

  <!-- Video cards will be added here by JavaScript -->
  <div id="video-container"></div>

  <!-- Connect JavaScript file -->
  <script src="main.js"></script>
</body>
</html>
